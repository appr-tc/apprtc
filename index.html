<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Standalone WebRTC with Collider</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: #e0e0e0; padding: 20px; }
        video { width: 45%; background: #222; margin: 10px; border-radius: 8px; border: 2px solid #333; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: bold; }
        #startBtn { background: #00e676; color: black; }
        #joinBtn { background: #29b6f6; color: black; }
        #status { font-weight: bold; color: #ffeb3b; font-size: 18px; margin: 15px 0; }
        input { padding: 8px; font-size: 16px; border-radius: 4px; border: 1px solid #555; background: #222; color: #fff; width: 220px; margin: 10px; text-align: center; }
    </style>
</head>
<body>
    <h2>Standalone WebRTC via Collider</h2>
    <div id="status">Status: Disconnected</div>
    
    <div>
        <label for="roomIdInput" style="font-weight: bold; font-size: 16px;">Room ID: </label>
        <input type="text" id="roomIdInput" value="standalone_test_room">
        <br>
        <button id="startBtn" onclick="initiateCall()">1. Start Call (Peer A)</button>
        <button id="joinBtn" onclick="joinCall()">2. Join Call (Peer B)</button>
    </div>

    <div>
        <video id="localVideo" autoplay playsinline muted></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script>
        // Dynamically resolve WebSocket URL based on how the page is loaded
        let wsUrl;
        if (window.location.protocol === "file:") {
            wsUrl = "ws://localhost:8089/ws";
        } else {
            const wsScheme = window.location.protocol === "https:" ? "wss:" : "ws:";
            wsUrl = `${wsScheme}//${window.location.host}/ws`;
        }
        
        let localStream;
        let peerConnection;
        let ws;
        let myClientId;
        let isInitiator = false;
        let roomId;

        const mediaConstraints = { audio: true, video: true };
        const rtcConfig = {
            iceServers: [
                { urls: "stun:stun.l.google.com:19302" } // Hardcoded Google STUN Server
            ]
        };

        // Generate a random 8-character alphanumeric ID
        function generateRandomId() {
            return Math.random().toString(36).substring(2, 10);
        }

        // Get local camera and microphone media
        async function startMedia() {
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
                    document.getElementById("localVideo").srcObject = localStream;
                } catch (e) {
                    updateStatus("Failed to access camera/microphone: " + e.message);
                    throw e;
                }
            }
        }

        // Connect to Collider WebSocket and register
        function connectToCollider(clientId) {
            roomId = document.getElementById("roomIdInput").value.trim() || "standalone_test_room";
            return new Promise((resolve, reject) => {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    updateStatus(`Connected to Collider as ${clientId} in Room ${roomId}`);
                    // Register with Collider
                    ws.send(JSON.stringify({
                        cmd: "register",
                        roomid: roomId,
                        clientid: clientId
                    }));
                    resolve();
                };

                ws.onerror = (err) => {
                    updateStatus("WebSocket connection error. Is Collider running?");
                    reject(err);
                };

                ws.onclose = () => {
                    updateStatus("Disconnected from Collider");
                };

                ws.onmessage = async (event) => {
                    const data = JSON.parse(event.data);
                    if (data.msg) {
                        const msg = JSON.parse(data.msg);
                        handleSignalingMessage(msg);
                    } else if (data.error) {
                        updateStatus("Collider Error: " + data.error);
                    }
                };
            });
        }

        // PEER A: Start the Call
        async function initiateCall() {
            isInitiator = true;
            myClientId = "peer_" + generateRandomId();
            
            try {
                await startMedia();
                await connectToCollider(myClientId);
                setupPeerConnection();

                // Create and send SDP Offer
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                sendSignalingMessage({ type: "offer", sdp: offer.sdp });
                updateStatus("SDP Offer sent. Waiting for Peer B...");
            } catch (e) {
                console.error(e);
            }
        }

        // PEER B: Join the Call
        async function joinCall() {
            isInitiator = false;
            myClientId = "peer_" + generateRandomId();

            try {
                await startMedia();
                await connectToCollider(myClientId);
                setupPeerConnection();
                updateStatus("Registered. Ready to receive offer...");
            } catch (e) {
                console.error(e);
            }
        }

        // Initialize RTCPeerConnection
        function setupPeerConnection() {
            peerConnection = new RTCPeerConnection(rtcConfig);

            // Add local stream tracks to PeerConnection
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            // Remote stream arrived
            peerConnection.ontrack = (event) => {
                document.getElementById("remoteVideo").srcObject = event.streams[0];
                updateStatus("P2P Call Connected!");
            };

            // Local ICE candidate gathered -> send to other peer
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignalingMessage({
                        type: "candidate",
                        label: event.candidate.sdpMLineIndex,
                        id: event.candidate.sdpMid,
                        candidate: event.candidate.candidate
                    });
                }
            };
        }

        // Handle incoming signaling messages from Collider
        async function handleSignalingMessage(message) {
            if (message.type === "offer") {
                updateStatus("SDP Offer received. Creating SDP Answer...");
                await peerConnection.setRemoteDescription(new RTCSessionDescription(message));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                sendSignalingMessage({ type: "answer", sdp: answer.sdp });
            } else if (message.type === "answer") {
                updateStatus("SDP Answer received. Establishing P2P...");
                await peerConnection.setRemoteDescription(new RTCSessionDescription(message));
            } else if (message.type === "candidate") {
                const candidate = new RTCIceCandidate({
                    sdpMLineIndex: message.label,
                    candidate: message.candidate
                });
                await peerConnection.addIceCandidate(candidate);
            }
        }

        // Send signaling message to the other peer via Collider
        function sendSignalingMessage(message) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    cmd: "send",
                    msg: JSON.stringify(message)
                }));
            } else {
                updateStatus("Cannot send message: WebSocket is not open.");
            }
        }

        // Update status text on screen
        function updateStatus(text) {
            document.getElementById("status").innerText = "Status: " + text;
            console.log(text);
        }

        // Explicitly close the WebSocket when the tab is closed or refreshed
        window.onbeforeunload = () => {
            if (ws) {
                try {
                    ws.close();
                } catch (e) {}
            }
        };
    </script>
</body>
</html>
